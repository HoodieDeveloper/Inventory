{% extends 'base.html' %}
{% block title %}Delete Product | Final_dbs{% endblock %}

{% block content %}
<section class="mx-auto w-full max-w-3xl px-4 py-10 sm:px-6 lg:px-8 lg:py-14">
    <div class="rounded-[2rem] border border-rose-200 bg-white p-8 shadow-soft sm:p-10">
        <p class="text-sm font-semibold uppercase tracking-[0.25em] text-rose-600">Danger Zone</p>
        <h1 class="mt-2 text-4xl font-black text-slate-900">Delete Product</h1>
        <p class="mt-3 text-slate-500">Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>

        <form method="post" class="mt-8 flex flex-col gap-3 sm:flex-row">
            {% csrf_token %}
            <a href="{% url 'manage_products' %}" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 shadow-sm transition hover:-translate-y-0.5">Cancel</a>
            <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-rose-600 px-5 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-rose-700">Delete</button>
        </form>
    </div>
</section>
{% endblock %}
